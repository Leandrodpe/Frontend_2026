<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador de CPF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input 
      type="text" 
      id="cpf" 
      placeholder="Digite o CPF"
      maxlength="14"
    />

    <button onclick="validarCPF()">Validar</button>

    <div id="resultado"></div>
  </div>

  <script>
    function validarCPF() {
      let cpf = document.getElementById("cpf").value;

      cpf = cpf.replace(/\D/g, "");

      const resultado = document.getElementById("resultado");

      if (cpf.length !== 11) {
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      if (/^(\d)\1+$/.test(cpf)) {
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf[i]) * (10 - i);
      }

      let digito1 = (soma * 10) % 11;

      if (digito1 === 10) {
        digito1 = 0;
      }

      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf[i]) * (11 - i);
      }

      let digito2 = (soma * 10) % 11;

      if (digito2 === 10) {
        digito2 = 0;
      }

      if (
        digito1 == cpf[9] &&
        digito2 == cpf[10]
      ) {
        resultado.innerHTML = "CPF Válido";
        resultado.className = "valido";
      } else {
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
      }
    }
  </script>

</body>
</html>
